<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Experiment</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
        }

        #hoverBtn {
            background-color: yellow;
            font-weight: bold;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <h2>JAVASCRIPT</h2>

    <p id="text">Arrays are list of values</p>

    <!-- Buttons -->
    <button onclick="changeText()">change text</button>
    <button onclick="addText()">add text</button>
    <button onclick="removeText()">remove text</button>
    <br><br>

    <button onclick="applyStyle()">Apply Styles</button>
    <button onclick="toggleStyle()">Toggle Style</button>
    <br><br>

    <!-- Mouse Events -->
    <button id="hoverBtn" onmouseover="mouseOver()" onmouseout="mouseOut()">
        Mouse Over
    </button>

    <br><br>

    <!-- Form -->
    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Enter Name"><br><br>
        <input type="number" id="age" placeholder="Enter Age"><br><br>
        <input type="email" id="email" placeholder="Enter Email"><br><br>
        <button type="submit">Submit</button>
    </form>

    <div id="result"></div>

    <br>
    <button onclick="window.print()">Print Page</button>

    <!-- JavaScript -->
    <script>
        // Variables
        let text = document.getElementById("text");

        // Functions
        function changeText() {
            text.innerHTML = "Text Changed!";
        }

        function addText() {
            text.innerHTML += " Added!";
        }

        function removeText() {
            text.innerHTML = "";
        }

        function applyStyle() {
            text.style.color = "blue";
            text.style.fontSize = "20px";
        }

        function toggleStyle() {
            text.classList.toggle("highlight");
        }

        // Mouse Events
        function mouseOver() {
            document.getElementById("hoverBtn").innerHTML = "Hovered!";
        }

        function mouseOut() {
            document.getElementById("hoverBtn").innerHTML = "Mouse Over";
        }

        // Form Validation
        function validateForm() {
            let name = document.getElementById("name").value;
            let age = document.getElementById("age").value;
            let email = document.getElementById("email").value;

            if (name === "" || age === "" || email === "") {
                alert("All fields are required!");
                return false;
            }

            document.getElementById("result").innerHTML =
                "Form submitted successfully!<br>" +
                "Name: " + name + "<br>" +
                "Age: " + age + "<br>" +
                "Email: " + email;

            return false; // prevent page reload
        }
    </script>

</body>
</html>
