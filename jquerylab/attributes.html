  // Disable checkbox using prop()
  $("#disableBtn").click(function(){
    $("#myCheck").prop("disabled", true);
  });

  // Enable checkbox using prop()
  $("#enableBtn").click(function(){
    $("#myCheck").prop("disabled", false);
  });

  // Get input value using val()
  $("#getValue").click(function(){
    var value = $("#myInput").val();
    $("#result").text("You entered: " + value);
  });

  // removeAttr() example (removes placeholder when typing)
  $("#myInput").focus(function(){
    $(this).removeAttr("placeholder");
  });
